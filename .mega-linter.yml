# Configuration file for MegaLinter
#
# See all available variables at https://megalinter.io/latest/config-file/ and in
# linters documentation

# all, none, or list of linter keys
APPLY_FIXES: all

# Disable linters that are not useful or cannot be satisfied
# Grype/Trivy: transitive dependency vulns tracked via `pnpm audit`
# Spell: too many false positives on technical terms and package names
DISABLE_LINTERS:
  - REPOSITORY_GRYPE
  - REPOSITORY_TRIVY
  - SPELL_CSPELL

# Filter out lockfiles from linters that are not useful on generated files
FILTER_REGEX_EXCLUDE: "pnpm-lock\\.yaml$|package-lock\\.json$"

SHOW_ELAPSED_TIME: true

FILEIO_REPORTER: false

name: Run tests

on:
  # Run this workflow on push to main
  push:
    branches:
      - main

  # Run this workflow on pull request to main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  type-check:
    if: github.event_name != 'pull_request' || (github.event_name == 'pull_request' && github.event.pull_request.draft == false)

    runs-on: ubuntu-latest

    steps:
      - name: Begin CI...
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm and install dependencies
        uses: pnpm/action-setup@v6
        with:
          run_install: true

      - name: Run tests
        run: pnpm run test --if-present

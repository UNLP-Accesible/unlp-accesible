# OSV-Scanner ignore rules
# Each entry documents a known vulnerability that cannot be fixed in the
# current dependency tree and explains why it is safe to ignore.

[[IgnoredVulns]]
id = "GHSA-mh29-5h37-fv8m"
reason = "js-yaml@3.13.1 appears only as a peer dep required by @vercel/frameworks@^3.x (a transitive dep of @sanity/cli). The app itself uses js-yaml@4.2.0 via pnpm override. Updating @vercel/frameworks' peer dep requirement requires an upstream release."

[[IgnoredVulns]]
id = "GHSA-h67p-54hq-rp68"
reason = "Affects js-yaml@<4.2.0. Patched in our override to 4.2.0. Residual 3.13.1 entry is a peer dep copy from @vercel/frameworks — see GHSA-mh29-5h37-fv8m above."

[[IgnoredVulns]]
id = "GHSA-qx2v-qp2m-jg93"
reason = "postcss@8.4.31 and 8.4.49 appear only as peer dep copies in the pnpm virtual store (required by older versions of tailwindcss and styled-components as peer deps). The app's postcss is overridden to 8.5.14 (>= required 8.5.10)."

[[IgnoredVulns]]
id = "GHSA-w5hq-g745-h8pq"
reason = "uuid@8.3.2 and @10.0.0 appear only as peer dep copies in the pnpm virtual store (required by @sanity/uuid and typeid-js as their own deps). The app's uuid is overridden to 14.0.0 (>= required 11.1.1)."
